<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PairFold — Local Backbone App</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #1a1612;
        color: #efe6da;
        font-family: "Segoe UI Variable", "Avenir Next", Candara, "Segoe UI", sans-serif;
        color-scheme: dark;
      }
      #boot {
        padding: 2rem 1.5rem;
        max-width: 40rem;
      }
      #boot strong {
        display: block;
        font-size: 1.75rem;
        letter-spacing: -0.03em;
        margin-bottom: 0.35rem;
      }
      #boot-status {
        color: #a89884;
      }
      #boot-error {
        color: #e07070;
        white-space: pre-wrap;
        font-family: Consolas, monospace;
        font-size: 0.85rem;
      }
      .file-open {
        max-width: 34rem;
        padding: 2.25rem 1.5rem;
      }
      .file-open h1 {
        margin: 0 0 0.5rem;
        font-size: 1.85rem;
        letter-spacing: -0.03em;
      }
      .file-open p {
        margin: 0 0 1rem;
        color: #a89884;
        line-height: 1.55;
      }
      .file-open code {
        color: #efe6da;
        background: #241e18;
        padding: 0.12rem 0.4rem;
        border-radius: 4px;
        font-size: 0.92em;
      }
      .file-open a {
        color: #c4894a;
      }
      .file-open ol {
        margin: 0;
        padding-left: 1.25rem;
        color: #efe6da;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="boot">
        <strong>PairFold</strong>
        <p id="boot-status">Starting…</p>
        <p id="boot-error" hidden></p>
      </div>
    </div>
    <script>
      (function () {
        // file:// cannot load Vite/ES modules — show how to open the real app immediately.
        if (location.protocol === "file:") {
          document.body.innerHTML =
            '<div class="file-open">' +
            "<h1>PairFold</h1>" +
            "<p>This file cannot run when opened directly from disk.</p>" +
            "<ol>" +
            "<li>Double-click <code>Web\\Open PairFold.vbs</code> (one click — opens the app), or</li>" +
            "<li>Double-click <code>Web\\PairFold.cmd</code></li>" +
            "</ol>" +
            "<p>Dev mode: <code>npm run dev</code> → " +
            '<a href="http://127.0.0.1:5173/">http://127.0.0.1:5173/</a></p>' +
            "</div>";
          return;
        }

        var status = document.getElementById("boot-status");
        var err = document.getElementById("boot-error");
        var timer = setTimeout(function () {
          if (status && status.textContent.indexOf("Starting") === 0) {
            status.textContent =
              "Still loading scripts… Hard-refresh (Ctrl+Shift+R), or open via Web\\Open PairFold.vbs";
          }
        }, 2500);
        window.__pairfoldClearBootTimer = function () {
          clearTimeout(timer);
        };
        window.addEventListener("error", function (ev) {
          if (!err) return;
          err.hidden = false;
          err.textContent =
            "Load error: " +
            (ev.message || "unknown") +
            (ev.filename ? "\n" + ev.filename + ":" + ev.lineno : "");
        });
        window.addEventListener("unhandledrejection", function (ev) {
          if (!err) return;
          err.hidden = false;
          err.textContent = "Load error: " + String(ev.reason || "promise rejected");
        });
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
